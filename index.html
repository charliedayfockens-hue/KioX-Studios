<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0b0e14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>KioX Drift — Forest</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b0e14'/%3E%3Ctext y='74' x='50' font-size='64' text-anchor='middle'%3E%F0%9F%8F%8E%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./css/style.css" />

  <!-- Three.js via import map. Vendored locally → no CDN dependency to break. -->
  <script type="importmap">
    {
      "imports": {
        "three": "./js/vendor/three.module.js"
      }
    }
  </script>
</head>
<body>
  <!-- ============ MAIN MENU ============ -->
  <div id="menu" class="screen">
    <canvas id="menu-canvas"></canvas>
    <div class="menu-overlay">
      <div class="menu-top">
        <div class="brand">
          <span class="brand-kiox">KIOX</span>
          <span class="brand-sub">STUDIOS</span>
        </div>
      </div>

      <div class="menu-center">
        <div class="track-chip">🌲 FOREST TRACK</div>
        <h1 class="game-title">
          <span class="title-line-1">DRIFT</span>
          <span class="title-line-2">ARENA</span>
        </h1>
        <p class="tagline">Slide. Smoke. Score.</p>

        <div class="menu-buttons">
          <button id="btn-play" class="btn btn-play">
            <span class="btn-shine"></span>
            <span class="btn-label">▶ PLAY</span>
          </button>
          <div class="btn-row">
            <button id="btn-fullscreen-menu" class="btn btn-chip">
              <span class="btn-label">⛶ Fullscreen</span>
            </button>
            <button id="btn-settings" class="btn btn-chip">
              <span class="btn-label">⚙ Settings</span>
            </button>
          </div>
        </div>
      </div>

      <div class="menu-bottom">
        <span class="hint">Best played sideways with sound on 🔊</span>
      </div>
    </div>
  </div>

  <!-- ============ SETTINGS MODAL ============ -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-card">
      <h2>⚙ Settings</h2>

      <!-- Car color picker -->
      <div class="setting-block">
        <span class="setting-title">Car Color</span>
        <div id="color-picker" class="color-picker">
          <button class="swatch" data-color="#ff3b3b" style="--sw:#ff3b3b" aria-label="Red"></button>
          <button class="swatch" data-color="#2f9bff" style="--sw:#2f9bff" aria-label="Blue"></button>
          <button class="swatch" data-color="#34c759" style="--sw:#34c759" aria-label="Green"></button>
          <button class="swatch" data-color="#ffd23f" style="--sw:#ffd23f" aria-label="Yellow"></button>
          <button class="swatch" data-color="#a35bff" style="--sw:#a35bff" aria-label="Purple"></button>
          <button class="swatch" data-color="#f4f6fa" style="--sw:#f4f6fa" aria-label="White"></button>
          <button class="swatch" data-color="#20242c" style="--sw:#20242c" aria-label="Black"></button>
          <button class="swatch" data-color="#ff8a1e" style="--sw:#ff8a1e" aria-label="Orange"></button>
        </div>
      </div>

      <label class="setting-row">
        <span>🔊 Sound Effects</span>
        <span class="toggle">
          <input type="checkbox" id="set-sound" checked />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </span>
      </label>

      <label class="setting-row">
        <span>💨 Tire Smoke</span>
        <span class="toggle">
          <input type="checkbox" id="set-smoke" checked />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </span>
      </label>

      <label class="setting-row">
        <span>🛞 Skid Marks</span>
        <span class="toggle">
          <input type="checkbox" id="set-skids" checked />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </span>
      </label>

      <label class="setting-row">
        <span>🎥 Camera Shake</span>
        <span class="toggle">
          <input type="checkbox" id="set-shake" checked />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </span>
      </label>

      <label class="setting-row column">
        <span>✨ Graphics Quality</span>
        <select id="set-quality">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </label>

      <button id="btn-settings-close" class="btn btn-play btn-full">Done</button>
    </div>
  </div>

  <!-- ============ ROTATE / LANDSCAPE HINT ============ -->
  <div id="rotate-hint" class="rotate-hint hidden">
    <div class="rotate-icon">📱↻</div>
    <p>Rotate your phone sideways<br />for the best experience.</p>
  </div>

  <!-- ============ GAME SCREEN ============ -->
  <div id="game" class="screen hidden">
    <canvas id="game-canvas"></canvas>

    <!-- Loading -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Loading Forest…</p>
    </div>

    <!-- HUD -->
    <div id="hud" class="hud">
      <div class="hud-top">
        <button id="btn-pause" class="hud-icon-btn">⏸</button>
        <div class="drift-panel">
          <div class="drift-score">
            <span id="drift-label" class="drift-status">READY</span>
            <span id="drift-current" class="drift-current"></span>
          </div>
          <div class="drift-total">
            <span class="drift-total-label">SCORE</span>
            <span id="drift-total-value">0</span>
          </div>
        </div>
        <button id="btn-fullscreen-game" class="hud-icon-btn">⛶</button>
      </div>

      <!-- Speedometer -->
      <div class="speedo">
        <span id="speed-value">0</span>
        <span class="speed-unit">km/h</span>
      </div>

      <!-- Left controls: handbrake ABOVE the two steer buttons -->
      <div class="controls controls-left">
        <button class="ctrl ctrl-handbrake" id="ctrl-handbrake" data-key="handbrake">
          <span class="ctrl-emoji">✋</span><span class="ctrl-text">DRIFT</span>
        </button>
        <div class="steer-row">
          <button class="ctrl ctrl-steer" id="ctrl-left" data-key="left">‹</button>
          <button class="ctrl ctrl-steer" id="ctrl-right" data-key="right">›</button>
        </div>
      </div>

      <!-- Right controls: brake + gas -->
      <div class="controls controls-right">
        <button class="ctrl ctrl-brake" id="ctrl-brake" data-key="brake">⌄</button>
        <button class="ctrl ctrl-gas" id="ctrl-gas" data-key="gas">⌃</button>
      </div>
    </div>

    <!-- Pause overlay -->
    <div id="pause-overlay" class="pause-overlay hidden">
      <div class="pause-card">
        <h2>⏸ Paused</h2>
        <button id="btn-resume" class="btn btn-play btn-full">Resume</button>
        <button id="btn-restart" class="btn btn-chip btn-full">Reset Car</button>
        <button id="btn-quit" class="btn btn-chip btn-full">Main Menu</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
